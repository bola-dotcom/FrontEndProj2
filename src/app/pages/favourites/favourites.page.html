<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>favourites</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
   <ion-card *ngFor="let recipe of favourites">
    <img [src]="recipe.strMealThumb" />

    <ion-card-header>
      <ion-card-title>{{ recipe.strMeal }}</ion-card-title>
    </ion-card-header>
  </ion-card>

  <p *ngIf="favourites.length === 0">No favourites yet</p>
</ion-content>
