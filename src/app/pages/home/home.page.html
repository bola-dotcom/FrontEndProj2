<ion-header>
  <ion-toolbar>
    <ion-title>Recipe App</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-card *ngFor="let recipe of recipes" [routerLink]="['/recipe', recipe.idMeal]">
    <img [src]="recipe.strMealThumb" />

    <ion-card-header>
      <ion-card-title>{{ recipe.strMeal }}</ion-card-title>
    </ion-card-header>

  </ion-card>

</ion-content>
